version: '3.8'
services:
  nexus:
    build: .
    ports:
      - "8080:8080"
      - "9090:9090"
    volumes:
      - nexus-data:/app/data
      - ./config.yaml:/app/config.yaml:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  nexus-data:
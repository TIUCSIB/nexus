syntax = "proto3";
package nexus.node;
option go_package = "nexus/internal/proto/node";

service NodeService {
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
  rpc GetConfig(GetConfigRequest) returns (GetConfigResponse);
  rpc ReportTraffic(TrafficReport) returns (TrafficReportResponse);
}

message RegisterRequest {
  string node_name = 1;
  string address = 2;
  string token = 3;
}

message RegisterResponse {
  bool success = 1;
  string node_id = 2;
  string auth_token = 3;
  string error = 4;
}

message HeartbeatRequest {
  string node_id = 1;
  double cpu_usage = 2;
  double memory_usage = 3;
  uint64 uptime = 4;
}

message HeartbeatResponse {
  bool success = 1;
  bool config_changed = 2;
}

message GetConfigRequest {
  string node_id = 1;
}

message GetConfigResponse {
  string singbox_config = 1;
  string users_json = 2;
}

message TrafficReport {
  string node_id = 1;
  repeated TrafficEntry entries = 2;
}

message TrafficEntry {
  string user_uuid = 1;
  uint64 upload = 2;
  uint64 download = 3;
}

message TrafficReportResponse {
  bool success = 1;
}
